<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3학년 교실 자리 배치 프로그램</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏫 3학년 학급 자리 배치 프로그램</h1>
        <p class="subtitle">우리 반의 새로운 자리를 공정하게 배치합니다.</p>
        
        <div class="main-layout">
            <div class="input-section">
                <h3>👥 학생 명단 입력</h3>
                <p class="notice">* 이름은 쉼표(,)나 줄바꿈으로 구분해 주세요.</p>
                
                <div class="input-group">
                    <label for="male-input">♂️ 남학생 명단</label>
                    <textarea id="male-input" placeholder="강백호, 서태웅, 송태섭..."></textarea>
                </div>
                
                <div class="input-group">
                    <label for="female-input">♀️ 여학생 명단</label>
                    <textarea id="female-input" placeholder="채소연, 신아리, 성춘향..."></textarea>
                </div>

                <div class="input-group">
                    <label for="cols-input">🪑 한 줄(열)당 책상 수</label>
                    <input type="number" id="cols-input" value="6" min="2" max="10">
                </div>
                
                <button id="start-btn" class="btn">🎲 자리 배치 시작!</button>
            </div>
            
            <div class="result-section">
                <div class="blackboard">칠 판 (Chalkboard)</div>
                <div id="classroom-grid" class="classroom-grid">
                    <p class="empty-msg">왼쪽에서 명단을 입력하고 버튼을 눌러주세요.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
